syntax = "proto3";

package kafkaflow;

option go_package = "github.com/kafkaflow/kafkaflow/internal/gen/proto";

service BrokerService {
  rpc Publish(PublishRequest) returns (PublishResponse);
  rpc FetchStream(FetchRequest) returns (stream FetchResponse);
  rpc GetMetadata(MetadataRequest) returns (MetadataResponse);
}

service AdminService {
  rpc CreateTopic(CreateTopicRequest) returns (CreateTopicResponse);
  rpc DeleteTopic(DeleteTopicRequest) returns (DeleteTopicResponse);
  rpc GetBrokerStats(GetBrokerStatsRequest) returns (BrokerStats);
  rpc ListTopics(ListTopicsRequest) returns (ListTopicsResponse);
}

message PublishRequest {
  string topic     = 1;
  int32  partition = 2;
  bytes  key       = 3;
  bytes  value     = 4;
  map<string, string> headers = 5;
}

message PublishResponse {
  int64 offset    = 1;
  int64 timestamp = 2;
  int32 partition = 3;
}

message FetchRequest {
  string topic     = 1;
  int32  partition = 2;
  int64  offset    = 3;
  int32  max_bytes = 4;
  int32  max_wait_ms = 5;
}

message FetchResponse {
  repeated Message messages = 1;
  int64 high_watermark      = 2;
}

message Message {
  int64  offset    = 1;
  int64  timestamp = 2;
  bytes  key       = 3;
  bytes  value     = 4;
  map<string, string> headers = 5;
}

message MetadataRequest {
  repeated string topics = 1;
}

message MetadataResponse {
  repeated TopicMetadata topics   = 1;
  repeated BrokerInfo    brokers  = 2;
}

message TopicMetadata {
  string name                        = 1;
  repeated PartitionMetadata partitions = 2;
}

message PartitionMetadata {
  int32 id       = 1;
  int32 leader   = 2;
  repeated int32 replicas = 3;
  repeated int32 isr      = 4;
  int64 high_watermark    = 5;
}

message BrokerInfo {
  int32  id   = 1;
  string addr = 2;
}

message CreateTopicRequest {
  string name              = 1;
  int32  partitions        = 2;
  int32  replication_factor = 3;
}

message CreateTopicResponse {
  bool   success = 1;
  string error   = 2;
}

message DeleteTopicRequest {
  string name = 1;
}

message DeleteTopicResponse {
  bool   success = 1;
  string error   = 2;
}

message GetBrokerStatsRequest {}

message BrokerStats {
  int32  broker_id           = 1;
  int64  messages_in         = 2;
  int64  messages_out        = 3;
  int64  bytes_in            = 4;
  int64  bytes_out           = 5;
  double messages_per_sec    = 6;
  double avg_latency_ms      = 7;
  double p99_latency_ms      = 8;
  int32  topic_count         = 9;
  int32  partition_count     = 10;
  int32  consumer_group_count = 11;
}

message ListTopicsRequest {}

message ListTopicsResponse {
  repeated string topics = 1;
}
