syntax = "proto3";

package kafkaflow;

option go_package = "github.com/kafkaflow/kafkaflow/internal/gen/proto";

service ConsumerService {
  rpc JoinGroup(JoinGroupRequest) returns (JoinGroupResponse);
  rpc SyncGroup(SyncGroupRequest) returns (SyncGroupResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (LeaveGroupResponse);
  rpc Heartbeat(HeartbeatRequest) returns (HeartbeatResponse);
  rpc CommitOffsets(CommitOffsetsRequest) returns (CommitOffsetsResponse);
  rpc FetchOffsets(FetchOffsetsRequest) returns (FetchOffsetsResponse);
}

message JoinGroupRequest {
  string group_id         = 1;
  string member_id        = 2;
  repeated string topics  = 3;
  int32  session_timeout_ms = 4;
}

message JoinGroupResponse {
  string group_id    = 1;
  string member_id   = 2;
  string leader_id   = 3;
  int32  generation  = 4;
  repeated string members = 5;
  string error       = 6;
}

message SyncGroupRequest {
  string group_id   = 1;
  string member_id  = 2;
  int32  generation = 3;
  map<string, PartitionAssignment> assignments = 4;
}

message PartitionAssignment {
  repeated int32 partitions = 1;
}

message SyncGroupResponse {
  string topic                       = 1;
  repeated int32 assigned_partitions = 2;
  string error                       = 3;
}

message LeaveGroupRequest {
  string group_id  = 1;
  string member_id = 2;
}

message LeaveGroupResponse {
  string error = 1;
}

message HeartbeatRequest {
  string group_id   = 1;
  string member_id  = 2;
  int32  generation = 3;
}

message HeartbeatResponse {
  bool   rebalance_needed = 1;
  string error            = 2;
}

message CommitOffsetsRequest {
  string group_id   = 1;
  string member_id  = 2;
  repeated OffsetCommit offsets = 3;
}

message OffsetCommit {
  string topic     = 1;
  int32  partition = 2;
  int64  offset    = 3;
}

message CommitOffsetsResponse {
  string error = 1;
}

message FetchOffsetsRequest {
  string group_id        = 1;
  repeated string topics = 2;
}

message FetchOffsetsResponse {
  repeated OffsetInfo offsets = 1;
}

message OffsetInfo {
  string topic     = 1;
  int32  partition = 2;
  int64  offset    = 3;
  int64  lag       = 4;
}
